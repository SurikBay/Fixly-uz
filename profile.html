<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usta Profili — Fixly.uz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #1a56db; --blue-dark: #1341b0; --green: #3ab246; --gray-bg: #f4f6fb; --gray-text: #6b7280; --dark: #111827; --border: #e5e7eb; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-bg); color: var(--dark); }

    nav { background: white; box-shadow: 0 1px 8px rgba(0,0,0,0.08); padding: 0 20px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 20px; font-weight: 800; color: var(--blue); text-decoration: none; }
    .nav-logo span { color: var(--green); }
    .nav-back { color: var(--gray-text); text-decoration: none; font-size: 14px; font-weight: 600; }

    .container { max-width: 700px; margin: 0 auto; padding: 24px 16px 48px; }

    /* LOADING */
    .loading { text-align: center; padding: 60px 20px; color: var(--gray-text); }
    .loading-icon { font-size: 48px; margin-bottom: 12px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PROFILE CARD */
    .profile-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .profile-header { background: linear-gradient(135deg, #1a56db, #1341b0); padding: 32px 20px 24px; text-align: center; position: relative; }
    .verified-badge { position: absolute; top: 16px; right: 16px; background: var(--green); color: white; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: white; margin: 0 auto 14px; border: 4px solid rgba(255,255,255,0.3); }
    .profile-name { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
    .profile-job { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 16px; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; }
    .p-stat-num { font-size: 22px; font-weight: 800; color: white; }
    .p-stat-label { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .profile-body { padding: 20px; }

    /* RATING */
    .rating-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .rating-big { font-size: 44px; font-weight: 800; }
    .stars-big { color: #f59e0b; font-size: 18px; }
    .rating-count { font-size: 13px; color: var(--gray-text); margin-top: 4px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .bar-label { font-size: 12px; color: var(--gray-text); width: 12px; }
    .bar-track { flex: 1; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: #f59e0b; border-radius: 3px; }

    /* INFO */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .info-item { background: var(--gray-bg); border-radius: 12px; padding: 14px; }
    .info-icon { font-size: 18px; margin-bottom: 4px; }
    .info-label { font-size: 11px; color: var(--gray-text); font-weight: 600; text-transform: uppercase; }
    .info-value { font-size: 14px; font-weight: 700; margin-top: 2px; }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; margin-top: 16px; }
    .about-text { font-size: 14px; color: var(--gray-text); line-height: 1.7; }
    .skills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .skill-tag { background: #eff6ff; color: var(--blue); border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; }

    /* ACTION */
    .action-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .available { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 14px; }
    .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .price-label { font-size: 13px; color: var(--gray-text); }
    .price-value { font-size: 22px; font-weight: 800; color: var(--blue); }
    .btn-chat { width: 100%; padding: 13px; background: white; color: var(--blue); border: 2px solid var(--blue); border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .btn-order { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

    /* NOT FOUND */
    .not-found { text-align: center; padding: 60px 20px; }
    .not-found-icon { font-size: 64px; margin-bottom: 16px; }
  </style>
</head>
<body>

<nav>
  <a href="search.html" class="nav-back">← Orqaga</a>
  <a href="index.html" class="nav-logo">Fix<span>ly</span>.uz</a>
  <div style="width:60px;"></div>
</nav>

<div class="container" id="container">
  <div class="loading">
    <div class="loading-icon">⚙️</div>
    <div>Yuklanmoqda...</div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://envyyamptxoqcfovdavm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVudnl5YW1wdHhvcWNmb3ZkYXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTI4NDEsImV4cCI6MjA5NzAyODg0MX0.qB-977hSOnQYizkYCzQxIBBQNqcdxJ-pbpx98yCToMU'
);

const colors = ['linear-gradient(135deg,#1a56db,#1341b0)','linear-gradient(135deg,#7c3aed,#4f46e5)','linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#3ab246,#059669)','linear-gradient(135deg,#ec4899,#8b5cf6)'];

async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const container = document.getElementById('container');

  if (!id) {
    container.innerHTML = '<div class="not-found"><div class="not-found-icon">🔍</div><div style="font-size:18px;font-weight:700;">Usta topilmadi</div><a href="search.html" style="display:inline-block;margin-top:16px;padding:12px 24px;background:#1a56db;color:white;border-radius:10px;text-decoration:none;font-weight:700;">← Orqaga</a></div>';
    return;
  }

  // Usta ma'lumotlarini olish
  const { data: usta, error } = await sb.from('ustalar').select('*').eq('id', id).single();

  if (error || !usta) {
    container.innerHTML = '<div class="not-found"><div class="not-found-icon">😔</div><div style="font-size:18px;font-weight:700;">Usta topilmadi</div><a href="search.html" style="display:inline-block;margin-top:16px;padding:12px 24px;background:#1a56db;color:white;border-radius:10px;text-decoration:none;font-weight:700;">← Orqaga</a></div>';
    return;
  }

  // User ma'lumotlarini olish
  const { data: user } = await sb.from('users').select('*').eq('id', usta.user_id).single();
  const name = user ? user.full_name : 'Usta';
  const initial = name[0].toUpperCase();
  const colorIdx = name.charCodeAt(0) % colors.length;
  const joinYear = user ? new Date(user.created_at).getFullYear() : '-';

  // Reytingni hisoblash
  const rating = usta.rating || 0;
  const totalJobs = usta.total_jobs || 0;
  const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));

  container.innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        ${usta.is_verified ? '<div class="verified-badge">✅ Tasdiqlangan</div>' : ''}
        <div class="avatar" style="background:${colors[colorIdx]};">${initial}</div>
        <div class="profile-name">${name}</div>
        <div class="profile-job">${usta.specialty || '-'} • ${usta.region || '-'}</div>
        <div class="profile-stats">
          <div><div class="p-stat-num">${totalJobs}</div><div class="p-stat-label">Ish bajarildi</div></div>
          <div><div class="p-stat-num">${rating || '—'}</div><div class="p-stat-label">Reyting</div></div>
          <div><div class="p-stat-num">${joinYear}</div><div class="p-stat-label">A'zo bo'lgan</div></div>
        </div>
      </div>

      <div class="profile-body">
        <div class="rating-row">
          <div>
            <div class="rating-big">${rating || '—'}</div>
            <div class="stars-big">${stars}</div>
            <div class="rating-count">${totalJobs} ta baholash</div>
          </div>
          <div style="flex:1;">
            ${[5,4,3,2,1].map(n => `
              <div class="bar-row">
                <span class="bar-label">${n}</span>
                <div class="bar-track"><div class="bar-fill" style="width:${n === Math.round(rating) ? '80%' : n === Math.round(rating)-1 ? '15%' : '3%'}"></div></div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item"><div class="info-icon">📍</div><div class="info-label">Hudud</div><div class="info-value">${usta.region || '-'}</div></div>
          <div class="info-item"><div class="info-icon">⏱</div><div class="info-label">Javob vaqti</div><div class="info-value">~15 daqiqa</div></div>
          <div class="info-item"><div class="info-icon">✅</div><div class="info-label">Bajarilgan ish</div><div class="info-value">${totalJobs} ta</div></div>
          <div class="info-item"><div class="info-icon">📅</div><div class="info-label">A'zo bo'lgan</div><div class="info-value">${joinYear} yil</div></div>
        </div>

        <div class="section-title">Mutaxassislik</div>
        <div class="skills">
          <span class="skill-tag">🔧 ${usta.specialty || '-'}</span>
          <span class="skill-tag">📍 ${usta.region || '-'}</span>
        </div>
      </div>
    </div>

    <div class="action-card">
      <div class="available"><div class="dot"></div>Hozir bo'sh, buyurtma qabul qiladi</div>
      <div class="price-row">
        <div><div class="price-label">Boshlang'ich narx</div><div class="price-value">50 000 <span style="font-size:13px;font-weight:400;color:#6b7280;">so'm/soat</span></div></div>
        <div style="text-align:right;"><div class="price-label">Kelish narxi</div><div style="font-size:14px;font-weight:700;color:var(--green);">Muzokarali</div></div>
      </div>
      <button class="btn-chat" onclick="window.location.href='chat.html'">💬 Chat orqali gaplashish</button>
      <button class="btn-order" onclick="window.location.href='order.html?usta_id=${id}'">📅 Buyurtma berish</button>
    </div>
  `;
}

loadProfile();
</script>
</body>
</html>
