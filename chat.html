<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — Fixly.uz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db; --green: #3ab246;
      --gray-bg: #f4f6fb; --gray-text: #6b7280; --dark: #111827; --border: #e5e7eb;
    }
    body { font-family: 'Inter', sans-serif; background: var(--gray-bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* NAV */
    .chat-nav { background: white; box-shadow: 0 1px 8px rgba(0,0,0,0.08); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .back-btn { color: var(--blue); text-decoration: none; font-size: 22px; }
    .chat-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--green)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: white; flex-shrink: 0; position: relative; }
    .online-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }
    .chat-info { flex: 1; }
    .chat-name { font-size: 15px; font-weight: 700; }
    .chat-status { font-size: 12px; color: var(--green); font-weight: 500; }

    /* STATUS BAR */
    .status-bar { background: #eff6ff; padding: 8px 16px; text-align: center; font-size: 12px; color: var(--blue); font-weight: 600; flex-shrink: 0; }

    /* MESSAGES */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
    .date-div { text-align: center; font-size: 12px; color: var(--gray-text); background: rgba(255,255,255,0.8); padding: 4px 12px; border-radius: 20px; margin: 8px auto; width: fit-content; }

    .msg-wrap { display: flex; flex-direction: column; max-width: 75%; }
    .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .mine .msg-bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
    .theirs .msg-bubble { background: white; color: var(--dark); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .msg-time { font-size: 11px; color: var(--gray-text); margin-top: 3px; }
    .msg-sender { font-size: 11px; color: var(--gray-text); margin-bottom: 3px; font-weight: 600; }

    /* TYPING */
    .typing { display: none; align-self: flex-start; background: white; border-radius: 18px; border-bottom-left-radius: 4px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 7px; height: 7px; background: var(--gray-text); border-radius: 50%; animation: typing 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

    /* EMPTY */
    .empty-chat { text-align: center; padding: 40px 20px; color: var(--gray-text); margin: auto; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* INPUT */
    .input-area { background: white; border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; }
    .quick-replies { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .quick-replies::-webkit-scrollbar { display: none; }
    .quick-btn { white-space: nowrap; padding: 6px 14px; background: #eff6ff; color: var(--blue); border: 1px solid #bfdbfe; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .input-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-input { flex: 1; border: 1.5px solid var(--border); border-radius: 22px; padding: 10px 16px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; resize: none; max-height: 120px; line-height: 1.5; }
    .msg-input:focus { border-color: var(--blue); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--blue); color: white; border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .send-btn:disabled { background: #e5e7eb; cursor: not-allowed; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #1a56db, #1341b0); }
    .login-card { background: white; border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 380px; }
    .login-icon { text-align: center; font-size: 52px; margin-bottom: 16px; }
    .login-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .fg input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; }
    .fg input:focus { border-color: var(--blue); }
    .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue), #1341b0); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .err { background: #fee2e2; border-radius: 10px; padding: 10px; font-size: 13px; color: #991b1b; margin-bottom: 14px; display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-icon">💬</div>
    <div class="login-title">Chatga kirish</div>
    <div class="err" id="err"></div>
    <div class="fg">
      <label>Telefon raqam</label>
      <div style="display:flex;gap:8px;">
        <input value="+998" readonly style="width:80px;flex-shrink:0;font-weight:600;"/>
        <input type="tel" id="l-phone" placeholder="90 123 45 67" maxlength="12"/>
      </div>
    </div>
    <button class="btn-login" id="l-btn">Kirish</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-app" style="display:none;height:100dvh;display:none;flex-direction:column;">

  <div class="chat-nav">
    <a href="javascript:history.back()" class="back-btn">←</a>
    <div class="chat-avatar" id="other-avatar">U<div class="online-dot"></div></div>
    <div class="chat-info">
      <div class="chat-name" id="other-name">...</div>
      <div class="chat-status" id="chat-status-text">● Online</div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">💬 Buyurtma bo'yicha chat</div>

  <div class="messages" id="messages">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-icon">💬</div>
      <div style="font-weight:700;">Xabarlar yo'q</div>
      <div style="font-size:13px;margin-top:4px;">Birinchi xabarni yuboring!</div>
    </div>
  </div>

  <div class="input-area">
    <div class="quick-replies" id="quick-replies">
      <button class="quick-btn" onclick="sendQuick('Salom! 👋')">Salom! 👋</button>
      <button class="quick-btn" onclick="sendQuick('Rahmat!')">Rahmat!</button>
      <button class="quick-btn" onclick="sendQuick('Qachon kela olasiz?')">Qachon kelasiz?</button>
      <button class="quick-btn" onclick="sendQuick('Tushunarli ✅')">Tushunarli ✅</button>
      <button class="quick-btn" onclick="sendQuick('Narx qancha?')">Narx qancha?</button>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msg-input" placeholder="Xabar yozing..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://envyyamptxoqcfovdavm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVudnl5YW1wdHhvcWNmb3ZkYXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTI4NDEsImV4cCI6MjA5NzAyODg0MX0.qB-977hSOnQYizkYCzQxIBBQNqcdxJ-pbpx98yCToMU'
);

let currentUser = null;
let buyurtmaId = null;
let pollInterval = null;
let lastMsgId = null;

// URL dan buyurtma_id olish
const params = new URLSearchParams(window.location.search);
buyurtmaId = params.get('id');

// Login
document.getElementById('l-btn').addEventListener('click', async function() {
  const phone = '+998' + document.getElementById('l-phone').value.trim();
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';

  const { data, error } = await sb.from('users').select('*').eq('phone', phone).single();
  if (error || !data) {
    errEl.textContent = '❌ Telefon raqam topilmadi!';
    errEl.style.display = 'block';
    return;
  }
  currentUser = data;
  localStorage.setItem('fixly_user', JSON.stringify(data));
  startChat();
});

function startChat() {
  document.getElementById('login-screen').style.display = 'none';
  const chatApp = document.getElementById('chat-app');
  chatApp.style.display = 'flex';

  // Agar buyurtma_id yo'q bo'lsa, oxirgi buyurtmani ol
  if (!buyurtmaId) {
    loadLastBuyurtma();
  } else {
    loadMessages();
    startPolling();
  }
}

async function loadLastBuyurtma() {
  const { data } = await sb.from('buyurtmalar').select('*').order('created_at', { ascending: false }).limit(1).single();
  if (data) {
    buyurtmaId = data.id;
    document.getElementById('status-bar').textContent = '📋 Buyurtma: ' + data.problem;
    loadMessages();
    startPolling();
  }
}

async function loadMessages() {
  if (!buyurtmaId) return;

  const { data: msgs } = await sb.from('messages')
    .select('*')
    .eq('buyurtma_id', buyurtmaId)
    .order('created_at', { ascending: true });

  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-chat');

  if (!msgs || msgs.length === 0) {
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  // Faqat yangi xabarlarni qo'shish
  const existing = new Set(Array.from(container.querySelectorAll('[data-id]')).map(el => el.getAttribute('data-id')));
  let hasNew = false;

  msgs.forEach(msg => {
    if (existing.has(msg.id)) return;
    hasNew = true;

    const isMine = currentUser && msg.sender_id === currentUser.id;
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + (isMine ? 'mine' : 'theirs');
    wrap.setAttribute('data-id', msg.id);

    if (!isMine) {
      const sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = msg.sender_name || 'Noma\'lum';
      wrap.appendChild(sender);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.text;
    wrap.appendChild(bubble);

    const time = document.createElement('div');
    time.className = 'msg-time';
    const d = new Date(msg.created_at);
    time.textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    wrap.appendChild(time);

    container.insertBefore(wrap, document.getElementById('empty-chat'));
  });

  if (hasNew) container.scrollTop = container.scrollHeight;

  // Other user name
  const other = msgs.find(m => currentUser && m.sender_id !== currentUser.id);
  if (other) {
    document.getElementById('other-name').textContent = other.sender_name || 'Foydalanuvchi';
    document.getElementById('other-avatar').textContent = (other.sender_name || 'U')[0].toUpperCase();
  }
}

function startPolling() {
  // Har 3 soniyada yangi xabarlarni tekshir
  pollInterval = setInterval(loadMessages, 3000);
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = '';
  input.style.height = 'auto';

  // buyurtmaId yo'q bo'lsa demo mode
  const bId = buyurtmaId || 'demo-chat-001';

  try {
    await sb.from('messages').insert([{
      buyurtma_id: bId,
      sender_id: currentUser.id,
      sender_name: currentUser.full_name,
      text: text
    }]);
    await loadMessages();
  } catch(e) {
    console.log('Send error:', e);
    // Hech bo'lmaganda UI da ko'rsatish
    const container = document.getElementById('messages');
    const empty = document.getElementById('empty-chat');
    empty.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap mine';
    wrap.innerHTML = '<div class="msg-bubble">' + text + '</div><div class="msg-time">' + new Date().toLocaleTimeString('uz', {hour:'2-digit',minute:'2-digit'}) + '</div>';
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }
}

function sendQuick(text) {
  document.getElementById('msg-input').value = text;
  sendMsg();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Auto login
window.onload = function() {
  const saved = localStorage.getItem('fixly_user') ||
                localStorage.getItem('fixly_mijoz') ||
                localStorage.getItem('fixly_usta');
  if (saved) {
    currentUser = JSON.parse(saved);
    startChat();
  }
};

window.onbeforeunload = function() {
  if (pollInterval) clearInterval(pollInterval);
};
</script>
</body>
  </html>
